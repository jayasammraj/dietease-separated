name: 🔥 Baseline Load Tests (300 Checks)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-tests:
    name: 🔥 Baseline Load Tests (100 VUs × 60s)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install load test dependencies
        working-directory: load-tests
        run: npm install

      - name: 🚀 Start backend server for load testing
        working-directory: pdd-app-separated/backend
        run: |
          npm ci
          node server.js &
          echo "Waiting for backend server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1 || curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Backend ready on port 3000"
              break
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done

      - name: 🔥 Run Baseline Load Tests (100 VUs × 60s)
        working-directory: load-tests
        run: node run-load-tests.js
        env:
          BASE_URL: 'http://localhost:3000'
        continue-on-error: true

      - name: 📁 Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: load-tests/reports/*.xlsx
          if-no-files-found: warn
          retention-days: 14
